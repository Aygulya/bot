# fly.toml app configuration file generated for tg-shop-bot on 2026-03-02T14:36:22+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tg-shop-bot'
primary_region = 'fra'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[processes]
  app = "npm run start"


[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
